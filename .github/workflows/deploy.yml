name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 3D en JavaScript (Three.js) : plus de compilation WASM/Rust.

      # --- Frontend ---
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # Jeu de points COMPACT (France entiere) servi par le GitHub Pages du depot
      # PUBLIC de donnees, sur la MEME origine (medialoco.github.io) que ce site :
      # pas de CORS. Le clustering est fait cote client (MapLibre), ce qui permet
      # aux filtres d'accessibilite de recomposer les grappes instantanement. Le
      # navigateur lit cette URL a l'execution : un rafraichissement hebdomadaire
      # des donnees est reflete sans redeploiement de l'app.
      - name: Point config to public France points (same-origin Pages)
        run: |
          cat > frontend/public/data/config.json <<'EOF'
          {
            "mode": "points",
            "source": "https://medialoco.github.io/accessibility-map-data/acceslibre-points.json",
            "label": "Acceslibre (France)",
            "attribution": "&copy; <a href=\"https://www.openstreetmap.org/copyright\" target=\"_blank\" rel=\"noopener\">OpenStreetMap</a> &middot; <a href=\"https://carto.com/attributions\" target=\"_blank\" rel=\"noopener\">CARTO</a> &middot; données <a href=\"https://acceslibre.beta.gouv.fr/\" target=\"_blank\" rel=\"noopener\">Acceslibre</a>"
          }
          EOF

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_MAPILLARY_TOKEN: ${{ secrets.VITE_MAPILLARY_TOKEN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
