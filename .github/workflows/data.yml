name: Build data (Acceslibre -> PMTiles)

# Recupere les donnees Acceslibre (cle en secret) et genere les tuiles
# vectorielles PMTiles, publiees comme asset de release `data-latest`.
# La cle API n'apparait jamais dans le depot ni dans les artefacts.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1" # chaque lundi 03:17 UTC

permissions:
  contents: write

jobs:
  build-tiles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j
          sudo make -C /tmp/tippecanoe install

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm install

      # France entiere depuis l'export CSV ouvert (data.gouv.fr) : aucune cle requise.
      - name: Fetch Acceslibre (France entiere, CSV)
        working-directory: pipeline
        run: node src/fetch-csv.mjs out/acceslibre.geojson

      - name: Build PMTiles (grappes)
        working-directory: pipeline
        run: node src/build-pmtiles.mjs out/acceslibre.geojson out/acceslibre.pmtiles

      - name: Publish tiles to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view data-latest >/dev/null 2>&1 || \
            gh release create data-latest --title "Donnees Acceslibre" --notes "Tuiles PMTiles regenerees automatiquement."
          gh release upload data-latest pipeline/out/acceslibre.pmtiles --clobber
