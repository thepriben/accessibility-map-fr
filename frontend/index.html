<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carte d'accessibilité - France</title>
    <meta
      name="description"
      content="Carte collaborative de l'accessibilité des lieux publics en France, à partir des données Acceslibre. Vue carte et vue liste accessible."
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Aller au contenu principal</a>

    <header class="app-header">
      <button id="home-btn" class="app-title" type="button" title="Revenir à l'accueil" aria-label="Carte d'accessibilité — revenir à l'accueil">
        Carte d'accessibilité
      </button>

      <!-- Recherche unique : nom, ville ou code postal -> téléportation -->
      <div id="search" class="search" role="search">
        <label for="search-input" class="sr-only">Rechercher un lieu ou un code postal</label>
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="…"
          autocomplete="off"
          role="combobox"
          aria-expanded="false"
          aria-controls="search-results"
          aria-autocomplete="list"
        />
        <ul id="search-results" class="search-results" role="listbox" aria-label="Résultats de recherche" hidden></ul>
      </div>

      <div class="header-actions">
        <div class="view-switch" role="tablist" aria-label="Choix de la vue">
          <button id="tab-map" role="tab" aria-selected="true" aria-controls="view-map" class="is-active">
            Carte
          </button>
          <button id="tab-list" role="tab" aria-selected="false" aria-controls="view-list">
            Liste
          </button>
        </div>
        <button id="toggle-3d" class="toggle-3d" type="button" aria-pressed="false" title="Basculer entre la vue 3D et la carte 2D">Vue 3D</button>
        <a
          id="repo-link"
          class="repo-link"
          href="https://github.com/thepriben/accessibility-map-fr"
          target="_blank"
          rel="noopener noreferrer"
          title="Code source sur GitHub"
          aria-label="Code source du projet sur GitHub (nouvel onglet)"
        >
          <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true" focusable="false" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </div>
    </header>

    <main id="main">
      <!-- Vue carte 2D -->
      <section id="view-map" class="view view-map" role="tabpanel" aria-labelledby="tab-map">
        <div id="map" class="map" role="application" aria-label="Carte des lieux accessibles"></div>
        <!-- Canvas de la scene 3D (Three.js), superpose et masque par defaut -->
        <canvas id="scene3d" class="scene3d" aria-hidden="true" tabindex="-1"></canvas>
        <div id="scene3d-ui" class="scene3d-ui" hidden></div>
        <!-- Légende de la carte 2D (bas-gauche) -->
        <details id="map-legend" class="map-legend" open>
          <summary>Légende</summary>
          <ul>
            <li><span class="lg-dot lg-cluster"></span> Regroupement de lieux (nombre)</li>
            <li><span class="lg-pin lg-ok"></span> Entrée accessible en fauteuil</li>
            <li><span class="lg-pin lg-no"></span> Entrée non accessible</li>
            <li><span class="lg-pin lg-unknown"></span> Accessibilité non renseignée</li>
          </ul>
        </details>
      </section>

      <!-- Vue liste accessible (RGAA/WCAG) -->
      <section id="view-list" class="view view-list" role="tabpanel" aria-labelledby="tab-list" hidden>
        <div id="list-container" class="list-container"></div>
      </section>
    </main>

    <!-- Fiche détaillée d'un lieu (voisinage + imagerie de rue) -->
    <aside id="place-panel" class="place-panel" aria-label="Fiche du lieu" hidden></aside>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <!-- Indicateur de chargement (spinner) pour les operations longues -->
    <div id="loader" class="loader" hidden>
      <div class="loader-box" role="status" aria-live="polite">
        <span class="loader-spinner" aria-hidden="true"></span>
        <span id="loader-msg" class="loader-msg">Chargement…</span>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
